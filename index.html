<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Emojis</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --border: #2d333b;
  --accent: #2ea043;
  --accent-bright: #3fb950;
  --accent-dim: rgba(46,160,67,0.13);
  --blue: #4493f8;
  --orange: #e3b341;
  --text: #cdd9e5;
  --muted: #768390;
  --dim: #444c56;
  --mono: ui-monospace, 'Cascadia Code', 'Fira Code', 'Menlo', 'Consolas', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --radius: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  line-height: 1.5;
}

/* GRID BG */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(48,54,61,0.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(48,54,61,0.4) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none; z-index: 0;
}

.wrap { position: relative; z-index: 1; max-width: 1380px; margin: 0 auto; padding: 0 20px 100px; }

/* HEADER */
header { padding: 56px 0 44px; display: flex; flex-direction: column; gap: 14px; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--accent-bright); border: 1px solid rgba(63,185,80,0.25); padding: 4px 11px 4px 9px; border-radius: 4px;
  width: fit-content; font-weight: 500;
}
.eyebrow svg { flex-shrink: 0; }
h1 {
  font-size: clamp(36px, 5vw, 62px);
  font-weight: 700; line-height: 1.05; letter-spacing: -0.025em;
}
h1 em { font-style: normal; color: var(--accent-bright); }
.subtitle {
  font-family: var(--mono); font-size: 12px; color: var(--muted);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.subtitle .count { color: var(--blue); }
.subtitle .sep { color: var(--dim); }

/* STICKY BAR */
.sticky-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 0; margin: 0 -20px; padding-left: 20px; padding-right: 20px;
  display: flex; flex-direction: column; gap: 10px;
}

/* SEARCH */
.search-wrap { position: relative; max-width: 580px; }
.search-wrap svg {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  color: var(--dim); pointer-events: none;
}
#search {
  width: 100%;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 110px 10px 40px;
  font-family: var(--mono); font-size: 13px; color: var(--text);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
#search:focus { border-color: var(--accent-bright); box-shadow: 0 0 0 3px rgba(63,185,80,0.1); }
#search::placeholder { color: var(--dim); }
#search-meta {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-family: var(--mono); font-size: 10px; color: var(--dim); pointer-events: none;
  white-space: nowrap;
}

/* FILTERS */
.filters { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.filter-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); margin-right: 2px; }
.pill {
  font-family: var(--mono); font-size: 10px; padding: 4px 11px;
  border-radius: 100px; border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  cursor: pointer; transition: all .13s; white-space: nowrap;
}
.pill:hover { border-color: var(--blue); color: var(--blue); }
.pill.active { background: var(--accent-bright); border-color: var(--accent-bright); color: #0d1117; font-weight: 600; }

/* CONTENT */
#content { margin-top: 36px; display: flex; flex-direction: column; gap: 44px; }

/* CATEGORY */
.cat-block {}
.cat-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 10px; margin-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.cat-icon { font-size: 17px; line-height: 1; }
.cat-name { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); font-family: var(--sans); }
.cat-count { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--dim); }

/* EMOJI GRID */
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: 5px;
}
.ec {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 13px 6px 9px; display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; transition: border-color .12s, background .12s, transform .12s, box-shadow .12s;
  position: relative; overflow: hidden; user-select: none;
}
.ec:hover {
  border-color: var(--blue); background: var(--surface2);
  transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}
.ec.flash { border-color: var(--accent-bright); background: var(--accent-dim); }
.ec.flash::after {
  content: 'copied!';
  position: absolute; inset: 0; background: rgba(13,17,23,0.85);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 9px; color: var(--accent-bright);
  border-radius: 5px;
}
.ec-char { font-size: 26px; line-height: 1; text-align: center; min-height: 30px; display: flex; align-items: center; justify-content: center; }
.ec-name {
  font-family: var(--mono); font-size: 8.5px; color: var(--dim);
  text-align: center; word-break: break-all; line-height: 1.35; max-width: 100%;
}
.ec:hover .ec-name { color: var(--muted); }

/* EMPTY */
#empty { display: none; padding: 80px 0; text-align: center; font-family: var(--mono); font-size: 13px; color: var(--dim); }

/* TOAST */
#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--surface2); border: 1px solid var(--accent-bright);
  color: var(--accent-bright); font-family: var(--mono); font-size: 11px;
  padding: 9px 18px; border-radius: 6px;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1);
  z-index: 9999; pointer-events: none; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* BACK TO TOP */
#btt {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); width: 38px; height: 38px;
  border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; opacity: 0; pointer-events: none; z-index: 90;
}
#btt.visible { opacity: 1; pointer-events: auto; }
#btt:hover { border-color: var(--blue); color: var(--blue); }

/* RESPONSIVE */
@media (max-width: 600px) {
  .emoji-grid { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); }
  h1 { font-size: 34px; }
}
</style>
</head>

const ORDER = ["Smileys & Emotion","People & Body","Animals & Nature","Food & Drink","Travel & Places","Activities","Objects","Symbols","Flags","GitHub Special","Miscellaneous"];

let activecat = 'all';
let query = '';

// Build flat list for searching
const ALL = [];
for (const cat of ORDER) {
  if (!DATA[cat]) continue;
  for (const e of DATA[cat].emojis) ALL.push({...e, cat});
}

// Render filter pills
const filtersEl = document.getElementById('filters');
for (const cat of ORDER) {
  if (!DATA[cat]) continue;
  const btn = document.createElement('button');
  btn.className = 'pill';
  btn.dataset.cat = cat;
  btn.textContent = DATA[cat].icon + ' ' + cat;
  btn.addEventListener('click', () => { activecat = cat; syncPills(); render(); });
  filtersEl.appendChild(btn);
}
document.querySelector('.pill[data-cat="all"]').addEventListener('click', () => { activecat = 'all'; syncPills(); render(); });

function syncPills() {
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.cat === activecat));
}

// Render
function render() {
  const q = query.trim().toLowerCase();
  const content = document.getElementById('content');
  const empty = document.getElementById('empty');
  content.innerHTML = '';

  let filtered;
  if (q || activecat !== 'all') {
    filtered = ALL.filter(e =>
      (activecat === 'all' || e.cat === activecat) &&
      (!q || e.name.toLowerCase().includes(q))
    );
  } else {
    filtered = ALL;
  }

  // update meta
  const meta = document.getElementById('search-meta');
  meta.textContent = (q || activecat !== 'all') ? filtered.length + ' results' : '';

  if (!filtered.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  // Group
  const groups = {};
  for (const e of filtered) {
    if (!groups[e.cat]) groups[e.cat] = [];
    groups[e.cat].push(e);
  }

  for (const cat of ORDER) {
    if (!groups[cat]) continue;
    const block = document.createElement('div');
    block.className = 'cat-block';

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <span class="cat-icon">${DATA[cat].icon}</span>
      <span class="cat-name">${cat}</span>
      <span class="cat-count">${groups[cat].length}</span>
    `;
    block.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'emoji-grid';

    for (const e of groups[cat]) {
      const card = document.createElement('div');
      card.className = 'ec';
      card.innerHTML = `<span class="ec-char">${e.char}</span><span class="ec-name">${e.name}</span>`;
      card.title = ':' + e.name + ':';
      card.addEventListener('click', () => copy(e.name, card));
      grid.appendChild(card);
    }

    block.appendChild(grid);
    content.appendChild(block);
  }
}

// Copy
let toastTimer;
function copy(name, card) {
  const code = ':' + name + ':';
  navigator.clipboard.writeText(code).then(() => {
    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 900);
    const t = document.getElementById('toast');
    t.textContent = 'Copied ' + code;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  });
}

// Search
document.getElementById('search').addEventListener('input', e => { query = e.target.value; render(); });

// Back to top
window.addEventListener('scroll', () => {
  document.getElementById('btt').classList.toggle('visible', window.scrollY > 400);
});

// Init
render();
</script>
